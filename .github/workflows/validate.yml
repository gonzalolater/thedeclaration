name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate signatures
        run: node scripts/validate-signatures.js
      - name: Content filter tests
        run: node scripts/test-content-filter.js
      - name: Build site
        run: node site/build.js
