# fly.toml — thedeclaration.ai
app = "thedeclaration"
primary_region = "sjc"

[build]

# No volume: the ledger and rate-limit state live in Neon Postgres
# (DATABASE_URL secret); /data on the ephemeral rootfs holds only a
# debug mirror rebuilt from the database at boot.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
